name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-native:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libdrm-dev libevdev-dev libegl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --bins

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native
          path: |
            target/release/toomuch
            target/release/greet

  build-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build wasm package
        run: wasm-pack build --release --target web --out-dir web/pkg

      - name: Zip web
        run: zip -r web.zip web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: web.zip

  release:
    needs: [build-native, build-web]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            native/toomuch
            native/greet
            web/web.zip
