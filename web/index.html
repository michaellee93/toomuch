<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>toomuch wasm</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap");
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #050508;
        overflow: hidden;
        color: #f2f4ff;
        font:
          14px ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #editor {
        position: fixed;
        left: 16px;
        top: 16px;
        width: min(520px, calc(100vw - 32px));
        height: calc(100vh - 32px);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        background: rgba(5, 5, 8, 0.86);
        border: 1px solid rgba(242, 244, 255, 0.1);
        border-radius: 8px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      #editor.collapsed {
        height: auto;
      }

      #editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        font-family: "JetBrains Mono", monospace;
      }

      #editor-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        opacity: 0.45;
      }

      #editor-content {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr auto 1fr auto 1fr auto auto;
        gap: 10px;
      }

      #editor.collapsed #editor-content {
        display: none;
      }

      label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.07em;
        opacity: 0.55;
      }

      textarea {
        min-height: 0;
        resize: none;
        border: 1px solid rgba(242, 244, 255, 0.15);
        border-radius: 5px;
        background: rgba(10, 10, 10, 0.4);
        color: #f2f4ff;
        padding: 10px 12px;
        font: inherit;
        outline: none;
        tab-size: 2;
        transition: border-color 0.15s;
      }

      textarea:focus {
        border-color: rgba(242, 244, 255, 0.45);
      }

      .btn {
        border-radius: 5px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
      }

      #render {
        margin-top: 0.2rem;
        width: max-content;
        border: none;
        background: #f2f4ff;
        color: #050508;
        padding: 8px 17px;
        width: 100%;
      }

      #render:hover {
        background: #fff;
      }

      #toggle-btn {
        border: 1px solid rgba(242, 244, 255, 0.25);
        background: transparent;
        color: rgba(242, 244, 255, 0.7);
        padding: 4px 10px;
        font-size: 12px;
      }

      #toggle-btn:hover {
        background: rgba(242, 244, 255, 0.08);
        color: #f2f4ff;
      }

      #error {
        min-height: 1.2em;
        margin: 0;
        font-size: 12px;
        color: #ff8f8f;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <canvas id="toomuch"></canvas>
    <section id="editor">
      <div id="editor-header">
        <span id="editor-title">shader editor</span>
        <button id="toggle-btn" class="btn">hide</button>
      </div>
      <div id="editor-content">
        <label for="bg-shader">background.glsl</label>
        <textarea id="bg-shader" spellcheck="false"></textarea>
        <label for="effect-shader">effect.glsl</label>
        <textarea id="effect-shader" spellcheck="false"></textarea>
        <label for="post-shader">postproc.glsl</label>
        <textarea id="post-shader" spellcheck="false"></textarea>
        <button id="render" class="btn" type="button">Render</button>
        <pre id="error"></pre>
      </div>
    </section>
    <script type="module">
      import init, { start } from "./pkg/toomuch.js";

      const defaultBgShader = `precision mediump float;
varying vec2 v_uv;
uniform float u_time;
void main() {
  gl_FragColor = vec4(0.117647, 0.117647, 0.180392 + ((v_uv.x + u_time) / 10000.0), 1.0);
}`;

      const defaultEffectShader = `precision highp float;
uniform sampler2D u_tex;
uniform float u_time;
uniform float u_aspect;
uniform vec2 u_resolution;
uniform int u_login_state;
uniform float u_state_time;
varying vec2 v_uv;

void main() {
  gl_FragColor = texture2D(u_tex, v_uv);
}`;

      const defaultPostShader = `precision highp float;
uniform sampler2D u_tex;
uniform float u_time;
uniform float u_aspect;
uniform vec2 u_resolution;
uniform int u_login_state;
uniform float u_state_time;
varying vec2 v_uv;

void main() {
  vec2 uv = v_uv;
  vec2 px = 1.0 / u_resolution;
  float wave = sin(uv.y * 80.0 + u_time * 8.0) * 0.0015;
  if (u_login_state == 4) {
    wave += sin(floor(uv.y * 36.0) + u_time * 40.0) * 0.012 * exp(-u_state_time * 2.8);
  }
  vec4 color = texture2D(u_tex, uv + vec2(wave, 0.0));
  color.rgb += texture2D(u_tex, uv + vec2(px.x * 2.0, 0.0)).rgb * 0.08;
  color.rgb *= 0.94 + 0.06 * sin(uv.y * u_resolution.y * 3.14159);
  gl_FragColor = color;
}`;

      const bgShader = document.getElementById("bg-shader");
      const effectShader = document.getElementById("effect-shader");
      const postShader = document.getElementById("post-shader");
      const render = document.getElementById("render");
      const error = document.getElementById("error");
      const editor = document.getElementById("editor");
      const toggleBtn = document.getElementById("toggle-btn");

      bgShader.value = defaultBgShader;
      effectShader.value = defaultEffectShader;
      postShader.value = defaultPostShader;

      for (const ta of [bgShader, effectShader, postShader]) {
        ta.addEventListener("keydown", (event) => event.stopPropagation());
      }

      toggleBtn.addEventListener("click", () => {
        const collapsed = editor.classList.toggle("collapsed");
        toggleBtn.textContent = collapsed ? "show" : "hide";
      });

      function buildConfig(bg, effect, post) {
        return `
[input]
font_size = 72

[background]
shader = ${JSON.stringify(bg)}

[background.effect]
shader = ${JSON.stringify(effect)}

[post]
shader = ${JSON.stringify(post)}
`;
      }

      try {
        await init();
        window.toomuch = start(
          "toomuch",
          buildConfig(bgShader.value, effectShader.value, postShader.value),
        );

        render.addEventListener("click", () => {
          try {
            window.toomuch.reload_config(
              buildConfig(bgShader.value, effectShader.value, postShader.value),
            );
            error.textContent = "";
          } catch (renderError) {
            error.textContent = renderError?.stack || String(renderError);
          }
        });
      } catch (err) {
        document.getElementById("error").textContent =
          err?.stack || String(err);
        throw err;
      }
    </script>
  </body>
</html>
