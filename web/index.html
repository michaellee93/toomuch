<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>toomuch wasm</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap");
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #050508;
        overflow: hidden;
        color: #f2f4ff;
        font:
          14px ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #editor {
        position: fixed;
        left: 16px;
        top: 16px;
        width: min(520px, calc(100vw - 32px));
        height: calc(100vh - 32px);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        background: rgba(5, 5, 8, 0.86);
        border: 1px solid rgba(242, 244, 255, 0.1);
        border-radius: 8px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      #editor.collapsed {
        height: auto;
        opacity: 80%;
      }

      #editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        font-family: "JetBrains Mono", monospace;
      }

      #editor-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        opacity: 0.45;
      }

      #editor-content {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto 1fr auto 1fr auto 1fr auto auto;
        gap: 10px;
      }

      #editor.collapsed #editor-content {
        display: none;
      }

      label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.07em;
        opacity: 0.55;
      }

      textarea {
        min-height: 0;
        resize: none;
        border: 1px solid rgba(242, 244, 255, 0.15);
        border-radius: 5px;
        background: rgba(10, 10, 10, 0.4);
        color: #f2f4ff;
        padding: 10px 12px;
        font: inherit;
        outline: none;
        tab-size: 2;
        transition: border-color 0.15s;
      }

      textarea:focus {
        border-color: rgba(242, 244, 255, 0.45);
      }

      .btn {
        border-radius: 5px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
      }

      #render {
        margin-top: 0.2rem;
        width: max-content;
        border: none;
        background: #f2f4ff;
        color: #050508;
        padding: 8px 17px;
        width: 100%;
      }

      #render:hover {
        background: #fff;
      }

      #toggle-btn {
        border: 1px solid rgba(242, 244, 255, 0.25);
        background: transparent;
        color: rgba(242, 244, 255, 0.7);
        padding: 4px 10px;
        font-size: 12px;
      }

      #toggle-btn:hover {
        background: rgba(242, 244, 255, 0.08);
        color: #f2f4ff;
      }

      #error {
        min-height: 1.2em;
        margin: 0;
        font-size: 12px;
        color: #ff8f8f;
        white-space: pre-wrap;
      }

      .preset-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: -2px;
      }

      .preset-btn {
        border: 1px solid rgba(242, 244, 255, 0.18);
        background: transparent;
        color: rgba(242, 244, 255, 0.55);
        padding: 2px 8px;
        font-size: 10px;
        letter-spacing: 0.06em;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
      }

      .preset-btn:hover {
        background: rgba(242, 244, 255, 0.08);
        color: #f2f4ff;
      }
    </style>
  </head>
  <body>
    <canvas id="toomuch"></canvas>
    <section id="editor">
      <div id="editor-header">
        <span id="editor-title">shader editor</span>
        <button id="toggle-btn" class="btn">hide</button>
      </div>
      <div id="editor-content">
        <label for="bg-shader">background.glsl</label>
        <div class="preset-bar" data-target="bg-shader">
          <button class="preset-btn" data-src="./shaders/bg/metaballs.glsl">metaballs</button>
          <button class="preset-btn" data-src="./shaders/bg/galaxy.glsl">galaxy</button>
          <button class="preset-btn" data-src="./shaders/bg/shane.glsl">shane</button>
          <button class="preset-btn" data-src="./shaders/bg/danilo.glsl">danilo</button>
          <button class="preset-btn" data-src="./shaders/bg/protean.glsl">protean</button>
        </div>
        <textarea id="bg-shader" spellcheck="false"></textarea>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <label for="effect-shader">effect.glsl</label>
          <button id="effect-toggle" class="preset-btn" style="font-size:10px;">enabled</button>
        </div>
        <textarea id="effect-shader" spellcheck="false"></textarea>
        <label for="post-shader">postproc.glsl</label>
        <textarea id="post-shader" spellcheck="false"></textarea>
        <button id="render" class="btn" type="button">Render</button>
        <pre id="error"></pre>
      </div>
    </section>
    <script type="module">
      import init, { start } from "./pkg/toomuch.js";

      const defaultBgShader = `precision highp float;
varying vec2 v_uv;
uniform float u_time;
uniform float u_aspect;

float smin(float a, float b, float k) {
  float h = max(k - abs(a - b), 0.0) / k;
  return min(a, b) - h * h * k * 0.25;
}

void main() {
  vec2 uv = (v_uv - 0.5) * 2.0;
  uv.x *= u_aspect;
  float t = u_time * 0.22;

  vec2 o0 = vec2(sin(t * 1.00)       * 0.55 * u_aspect, cos(t * 0.70)       * 0.45);
  vec2 o1 = vec2(sin(t * 0.60 + 2.1) * 0.60 * u_aspect, cos(t * 1.20 + 1.0) * 0.40);
  vec2 o2 = vec2(sin(t * 1.30 + 4.2) * 0.40 * u_aspect, cos(t * 0.50 + 3.1) * 0.55);
  vec2 o3 = vec2(sin(t * 0.90 + 1.5) * 0.50 * u_aspect, cos(t * 1.40 + 0.7) * 0.35);

  float d = length(uv - o0) - 0.28;
  d = smin(d, length(uv - o1) - 0.22, 0.35);
  d = smin(d, length(uv - o2) - 0.20, 0.30);
  d = smin(d, length(uv - o3) - 0.18, 0.28);

  float glow = exp(-max(d, 0.0) * 4.5);
  float fill = smoothstep(0.01, -0.01, d);
  float rim  = smoothstep(0.0, 0.07, d) * smoothstep(0.14, 0.03, d);

  float w0 = exp(-length(uv - o0) * 2.5);
  float w1 = exp(-length(uv - o1) * 2.5);
  float w2 = exp(-length(uv - o2) * 2.5);
  float w3 = exp(-length(uv - o3) * 2.5);
  float wt = w0 + w1 + w2 + w3 + 1e-5;

  vec3 c0 = vec3(0.14, 0.04, 0.40);
  vec3 c1 = vec3(0.04, 0.10, 0.50);
  vec3 c2 = vec3(0.30, 0.04, 0.35);
  vec3 c3 = vec3(0.04, 0.16, 0.45);
  vec3 orbColor = (c0*w0 + c1*w1 + c2*w2 + c3*w3) / wt;

  vec3 col = vec3(0.03, 0.03, 0.055);
  col += orbColor * glow * 0.55;
  col += orbColor * fill * 0.35;
  col += vec3(0.55, 0.65, 1.0) * rim * 0.12;
  col *= 1.0 - dot(v_uv - 0.5, v_uv - 0.5) * 1.1;

  gl_FragColor = vec4(col, 1.0);
}`;

      const defaultEffectShader = `precision highp float;
uniform sampler2D u_tex;
uniform sampler2D u_aux_tex;
uniform float u_time;
uniform float u_aspect;
uniform vec2 u_resolution;
uniform int u_login_state;
uniform float u_state_time;
varying vec2 v_uv;

const float CHAR_W   = 16.0;
const float CHAR_H   = 16.0;
const float RAMP_LEN = 95.0;

void main() {
  vec2 cSz   = vec2(CHAR_W, CHAR_H);
  vec2 cidx  = floor(v_uv * u_resolution / cSz);
  vec2 ctr   = (cidx + 0.5) * cSz / u_resolution;

  vec4 bg    = texture2D(u_tex, ctr);
  float luma  = dot(bg.rgb, vec3(0.299, 0.587, 0.114));
  float lumag = pow(luma, 0.45);

  float ci    = floor(lumag * (RAMP_LEN - 1.0));
  vec2 inCell = fract(v_uv * u_resolution / cSz);
  float mask  = texture2D(u_aux_tex, vec2((ci + inCell.x) / RAMP_LEN, 1.0 - inCell.y)).r;

  vec3 bloom = vec3(0.0);
  float bwt  = 0.0;
  for (int dy = -2; dy <= 2; dy++) {
    for (int dx = -2; dx <= 2; dx++) {
      vec2 nc  = (cidx + vec2(float(dx), float(dy)) + 0.5) * cSz / u_resolution;
      vec3 s   = texture2D(u_tex, clamp(nc, vec2(0.0), vec2(1.0))).rgb;
      float nl = dot(s, vec3(0.299, 0.587, 0.114));
      float w  = exp(-float(dx * dx + dy * dy) * 0.3) * nl * nl;
      bloom   += s * w;
      bwt     += w;
    }
  }
  if (bwt > 0.0) bloom /= bwt;

  vec3 char_col = bg.rgb * mask;
  vec3 glow_col = bloom * (1.0 - mask) * lumag * 0.7;
  vec3 dark_tint = bg.rgb * (1.0 - mask) * 0.12;
  gl_FragColor = vec4(char_col + glow_col + dark_tint, 1.0);
}`;

      const defaultPostShader = `precision highp float;
uniform sampler2D u_tex;
uniform float u_time;
uniform float u_aspect;
uniform vec2 u_resolution;
uniform int u_login_state;
uniform float u_state_time;
varying vec2 v_uv;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

void main() {
  vec2 uv = v_uv;
  vec2 px = 1.0 / u_resolution;

  // subtle horizontal wave
  uv.x += sin(uv.y * 60.0 + u_time * 6.0) * 0.0008;

  // chromatic aberration
  float ca = 0.0008;
  float r = texture2D(u_tex, uv + vec2(ca, 0.0)).r;
  float g = texture2D(u_tex, uv).g;
  float b = texture2D(u_tex, uv - vec2(ca, 0.0)).b;
  vec3 col = vec3(r, g, b);

  // soft bloom
  vec3 bloom = texture2D(u_tex, uv + vec2(px.x * 2.0, 0.0)).rgb;
  bloom    += texture2D(u_tex, uv - vec2(px.x * 2.0, 0.0)).rgb;
  bloom    += texture2D(u_tex, uv + vec2(0.0, px.y * 2.0)).rgb;
  bloom    += texture2D(u_tex, uv - vec2(0.0, px.y * 2.0)).rgb;
  col += bloom * 0.055;

  // scanlines
  col *= 0.97 + 0.03 * sin(uv.y * u_resolution.y * 3.14159);

  // vignette
  vec2 c = uv - 0.5;
  col *= 1.0 - dot(c, c) * 1.8;

  // film grain
  col += (hash(uv + fract(u_time * 0.1)) - 0.5) * 0.028;

  // auth failure red flash
  if (u_login_state == 4) {
    float hit = exp(-u_state_time * 3.0);
    col = mix(col, col * vec3(1.5, 0.55, 0.55), hit);
  }

  gl_FragColor = vec4(max(col, vec3(0.0)), 1.0);
}`;

      const bgShader = document.getElementById("bg-shader");
      const effectShader = document.getElementById("effect-shader");
      const postShader = document.getElementById("post-shader");
      const render = document.getElementById("render");
      const error = document.getElementById("error");
      const editor = document.getElementById("editor");
      const toggleBtn = document.getElementById("toggle-btn");

      bgShader.value = defaultBgShader;
      effectShader.value = defaultEffectShader;
      postShader.value = defaultPostShader;

      for (const ta of [bgShader, effectShader, postShader]) {
        ta.addEventListener("keydown", (event) => event.stopPropagation());
      }

      toggleBtn.addEventListener("click", () => {
        const collapsed = editor.classList.toggle("collapsed");
        toggleBtn.textContent = collapsed ? "show" : "hide";
      });

      let effectEnabled = true;

      const effectToggle = document.getElementById("effect-toggle");
      effectToggle.addEventListener("click", () => {
        effectEnabled = !effectEnabled;
        effectToggle.textContent = effectEnabled ? "enabled" : "disabled";
        effectToggle.style.opacity = effectEnabled ? "" : "0.4";
        encodeState();
      });

      const b64enc = (s) => btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
      const b64dec = (s) => atob(s.replace(/-/g, "+").replace(/_/g, "/"));

      function encodeState() {
        const params = new URLSearchParams();
        params.set("bg", b64enc(bgShader.value));
        params.set("effect", b64enc(effectShader.value));
        params.set("post", b64enc(postShader.value));
        params.set("fx", effectEnabled ? "1" : "0");
        history.replaceState(null, "", "?" + params.toString());
      }

      function decodeState() {
        const params = new URLSearchParams(location.search);
        if (params.has("bg")) bgShader.value = b64dec(params.get("bg"));
        if (params.has("effect")) effectShader.value = b64dec(params.get("effect"));
        if (params.has("post")) postShader.value = b64dec(params.get("post"));
        if (params.has("fx")) {
          effectEnabled = params.get("fx") === "1";
          effectToggle.textContent = effectEnabled ? "enabled" : "disabled";
          effectToggle.style.opacity = effectEnabled ? "" : "0.4";
        }
      }

      decodeState();

      function buildConfig(bg, effect, post) {
        const effectSection = effectEnabled
          ? `\n[background.effect]\nshader = ${JSON.stringify(effect)}\n`
          : "";
        return `
[input]
font_size = 72

[background]
shader = ${JSON.stringify(bg)}
${effectSection}
[post]
shader = ${JSON.stringify(post)}
`;
      }

      document.querySelectorAll(".preset-bar").forEach((bar) => {
        const targetId = bar.dataset.target;
        bar.querySelectorAll(".preset-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            try {
              const src = await fetch(btn.dataset.src).then((r) => r.text());
              document.getElementById(targetId).value = src;
            } catch (e) {
              console.error("failed to load preset:", e);
            }
          });
        });
      });

      try {
        await init();
        window.toomuch = start(
          "toomuch",
          buildConfig(bgShader.value, effectShader.value, postShader.value),
        );

        const ro = new ResizeObserver(() => {
          try { window.toomuch.resize(); } catch (e) { console.error(e); }
        });
        ro.observe(document.getElementById("toomuch"));

        render.addEventListener("click", () => {
          try {
            window.toomuch.reload_config(
              buildConfig(bgShader.value, effectShader.value, postShader.value),
            );
            encodeState();
            error.textContent = "";
          } catch (renderError) {
            error.textContent = renderError?.stack || String(renderError);
          }
        });
      } catch (err) {
        document.getElementById("error").textContent =
          err?.stack || String(err);
        throw err;
      }
    </script>
  </body>
</html>
