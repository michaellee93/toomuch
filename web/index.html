<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>toomuch wasm</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #050508;
        overflow: hidden;
        color: #f2f4ff;
        font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #error {
        position: fixed;
        left: 16px;
        right: 16px;
        top: 16px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <canvas id="toomuch"></canvas>
    <pre id="error"></pre>
    <script type="module">
      import init, { start_default } from "./pkg/toomuch.js";

      try {
        await init();
        window.toomuch = start_default("toomuch");
      } catch (error) {
        document.getElementById("error").textContent =
          error?.stack || String(error);
        throw error;
      }
    </script>
  </body>
</html>
